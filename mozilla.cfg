//
// mozilla.cfg – Firefox Global Config
// Optimized for: 30 profiles · RDP/VM environment · Automation addon · Windows
// Fix: AsyncShutdownTimeout targeting.snapshot crash (JSONFile.sys.mjs:130)
//
// INSTALL:
//   1. Place mozilla.cfg in: C:\Program Files\Mozilla Firefox\
//   2. Place local-settings.js in: C:\Program Files\Mozilla Firefox\
//      Contents of local-settings.js:
//        pref("general.config.obscure_value", 0);
//        pref("general.config.filename", "mozilla.cfg");
//


// ═══════════════════════════════════════════════════════════
// WELCOME / ONBOARDING
// ═══════════════════════════════════════════════════════════
lockPref("browser.aboutwelcome.enabled", false);
lockPref("startup.homepage_welcome_url", "");
lockPref("startup.homepage_welcome_url.additional", "");
lockPref("browser.startup.homepage_override.mstone", "ignore");
lockPref("browser.uitour.enabled", false);
lockPref("browser.uitour.whatsnew.enabled", false);


// ═══════════════════════════════════════════════════════════
// STARTUP
// ═══════════════════════════════════════════════════════════
lockPref("browser.startup.homepage", "about:blank");
lockPref("browser.startup.page", 0);
lockPref("browser.shell.checkDefaultBrowser", false);


// ═══════════════════════════════════════════════════════════
// NEW TAB
// ═══════════════════════════════════════════════════════════
lockPref("browser.newtabpage.enabled", false);
lockPref("browser.newtab.preload", false);
lockPref("browser.newtabpage.activity-stream.feeds.snippets", false);
lockPref("browser.newtabpage.activity-stream.feeds.telemetry", false);
lockPref("browser.newtabpage.activity-stream.feeds.section.highlights", false);
lockPref("browser.newtabpage.activity-stream.telemetry", false);
lockPref("browser.newtabpage.activity-stream.showSponsored", false);
lockPref("browser.newtabpage.activity-stream.showSponsoredTopSites", false);
lockPref("browser.newtabpage.activity-stream.asrouter.userprefs.cfr.addons", false);
lockPref("browser.newtabpage.activity-stream.asrouter.userprefs.cfr.features", false);


// ═══════════════════════════════════════════════════════════
// URL BAR
// ═══════════════════════════════════════════════════════════
lockPref("browser.urlbar.groupLabels.enabled", false);
lockPref("browser.urlbar.speculativeConnect.enabled", false);
lockPref("browser.urlbar.suggest.quicksuggest.nonsponsored", false);
lockPref("browser.urlbar.suggest.quicksuggest.sponsored", false);


// ═══════════════════════════════════════════════════════════
// TABS / QUIT WARNINGS
// ═══════════════════════════════════════════════════════════
lockPref("browser.tabs.warnOnClose", false);
lockPref("browser.tabs.warnOnCloseOtherTabs", false);
lockPref("browser.tabs.warnOnOpen", false);
lockPref("browser.warnOnQuit", false);
lockPref("browser.warnOnRestart", false);
lockPref("dom.disable_beforeunload", true);
lockPref("prompts.tab_modal.enabled", false);


// ═══════════════════════════════════════════════════════════
// PROCESS / MEMORY
// ═══════════════════════════════════════════════════════════
lockPref("fission.autostart", true);                         // keep ON — stable on FF 94+
lockPref("dom.ipc.processCount", 4);                         // per Firefox instance
lockPref("dom.ipc.processCount.webIsolated", 1);
lockPref("dom.ipc.plugins.hang-ui.enabled", false);
lockPref("browser.tabs.unloadOnLowMemory", true);
lockPref("browser.low_memory_notification_interval_ms", 10000);


// ═══════════════════════════════════════════════════════════
// CACHE  (disk OFF — prevents 30x simultaneous disk thrashing)
// ═══════════════════════════════════════════════════════════
lockPref("browser.cache.disk.enable", false);
lockPref("browser.cache.memory.enable", true);
lockPref("browser.cache.memory.capacity", 524288);           // 512MB RAM cache per profile
lockPref("browser.cache.memory.max_entry_size", 51200);


// ═══════════════════════════════════════════════════════════
// SESSION
// ═══════════════════════════════════════════════════════════
lockPref("browser.sessionstore.interval", 60000);
lockPref("browser.sessionstore.max_tabs_undo", 0);
lockPref("browser.sessionstore.max_windows_undo", 0);
lockPref("browser.sessionstore.resume_from_crash", false);


// ═══════════════════════════════════════════════════════════
// SHUTDOWN CRASH FIX
// Prevents AsyncShutdownTimeout on targeting.snapshot (JSONFile.sys.mjs:130)
// Root cause: messaging system tries to write JSON to disk at shutdown
// while 30 profiles compete for I/O — times out and aborts
// ═══════════════════════════════════════════════════════════
lockPref("browser.messaging-system.rsexperimentloader.enabled", false);
lockPref("messaging-system.rsexperimentloader.enabled", false);
lockPref("app.update.background.scheduling.enabled", false);
lockPref("app.update.background.enabled", false);
lockPref("datareporting.policy.firstRunURL", "");
lockPref("toolkit.shutdown.waitForAsyncShutdown", false);


// ═══════════════════════════════════════════════════════════
// GPU / RENDERING  (RDP virtual adapter — no real GPU)
// Fixes: D3D11VideoDevice error 0x80004002, WebRender failures
// ═══════════════════════════════════════════════════════════
lockPref("layers.acceleration.disabled", true);
lockPref("gfx.webrender.all", false);
lockPref("gfx.webrender.enabled", false);
lockPref("gfx.direct2d.disabled", true);                     // fixes D3D11 0x80004002
lockPref("gfx.canvas.azure.backends", "skia");               // force software canvas
lockPref("media.hardware-video-decoding.enabled", false);
lockPref("toolkit.cosmeticAnimations.enabled", false);


// ═══════════════════════════════════════════════════════════
// UPDATES
// ═══════════════════════════════════════════════════════════
lockPref("app.update.auto", false);
lockPref("app.update.enabled", false);
lockPref("extensions.update.enabled", false);
lockPref("extensions.update.autoUpdateDefault", false);
lockPref("extensions.getAddons.cache.enabled", false);
lockPref("browser.search.update", false);


// ═══════════════════════════════════════════════════════════
// TELEMETRY & REPORTING
// ═══════════════════════════════════════════════════════════
lockPref("toolkit.telemetry.unified", false);
lockPref("toolkit.telemetry.enabled", false);
lockPref("toolkit.telemetry.server", "data:,");
lockPref("datareporting.policy.dataSubmissionEnabled", false);
lockPref("datareporting.policy.dataSubmissionPolicyBypassNotification", true);
lockPref("datareporting.policy.dataSubmissionPolicyAccepted", true);
lockPref("datareporting.healthreport.uploadEnabled", false);
lockPref("app.shield.optoutstudies.enabled", false);
lockPref("app.normandy.enabled", false);
lockPref("app.normandy.api_url", "");
lockPref("breakpad.reportURL", "");
lockPref("browser.tabs.crashReporting.sendReport", false);
lockPref("browser.ping-centre.telemetry", false);


// ═══════════════════════════════════════════════════════════
// DISCOVERY & RECOMMENDATIONS
// ═══════════════════════════════════════════════════════════
lockPref("browser.discovery.enabled", false);
lockPref("extensions.getAddons.showPane", false);
lockPref("extensions.htmlaboutaddons.recommendations.enabled", false);


// ═══════════════════════════════════════════════════════════
// EXTENSIONS / AUTOMATION ADDON
// ═══════════════════════════════════════════════════════════
lockPref("xpinstall.signatures.required", false);
lockPref("xpinstall.whitelist.required", false);
lockPref("extensions.autoDisableScopes", 0);
lockPref("extensions.enabledScopes", 15);
lockPref("extensions.logging.enabled", false);
lockPref("extensions.pocket.enabled", false);
lockPref("extensions.formautofill.addresses.enabled", false);
lockPref("extensions.formautofill.creditCards.enabled", false);


// ═══════════════════════════════════════════════════════════
// NETWORK
// ═══════════════════════════════════════════════════════════
lockPref("network.prefetch-next", false);
lockPref("network.dns.disablePrefetch", true);
lockPref("network.http.max-connections", 900);
lockPref("network.http.max-persistent-connections-per-server", 10);
lockPref("network.http.max-persistent-connections-per-proxy", 48);
lockPref("network.proxy.socks_remote_dns", true);


// ═══════════════════════════════════════════════════════════
// SAFE BROWSING
// ═══════════════════════════════════════════════════════════
lockPref("browser.safebrowsing.malware.enabled", false);
lockPref("browser.safebrowsing.phishing.enabled", false);
lockPref("browser.safebrowsing.downloads.enabled", false);
lockPref("browser.safebrowsing.passwords.enabled", false);


// ═══════════════════════════════════════════════════════════
// TRANSLATIONS
// ═══════════════════════════════════════════════════════════
lockPref("browser.translations.enable", false);
lockPref("browser.translations.automaticallyPopup", false);
lockPref("browser.translations.panelShown", true);
lockPref("browser.translations.neverTranslateLanguages", "*");


// ═══════════════════════════════════════════════════════════
// SIDEBAR
// ═══════════════════════════════════════════════════════════
lockPref("sidebar.visibility", "always-show");
lockPref("sidebar.revamp", true);





// ── Safe Browsing ─────────────────────────────────────────
lockPref("browser.safebrowsing.malware.enabled", false);
lockPref("browser.safebrowsing.phishing.enabled", false);
lockPref("browser.safebrowsing.downloads.enabled", false);
lockPref("browser.safebrowsing.passwords.enabled", false);


// ── Translations ──────────────────────────────────────────
lockPref("browser.translations.enable", false);
lockPref("browser.translations.automaticallyPopup", false);
lockPref("browser.translations.panelShown", true);
lockPref("browser.translations.neverTranslateLanguages", "*");

